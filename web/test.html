<!DOCTYPE html>
<html>
<head>
  <title>RytuAI Auth Test</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input { padding: 8px; margin: 5px; width: 200px; }
    button { padding: 10px 20px; margin: 5px; background: green; color: white; border: none; cursor: pointer; }
    pre { background: #f0f0f0; padding: 15px; border-radius: 8px; }
  </style>
</head>
<body>
  <h2>🌶️ RytuAI Login Test</h2>
 
  <h3>Step 1 — Send OTP</h3>
  <input type="text" id="phone" placeholder="Enter phone number" />
  <button onclick="sendOTP()">Send OTP</button>
 
  <h3>Step 2 — Verify OTP</h3>
  <input type="text" id="otp" placeholder="Enter OTP received" />
  <button onclick="verifyOTP()">Verify OTP</button>
 
  <h3>Result:</h3>
  <pre id="result">Result will appear here...</pre>
 
  <script>
    let currentPhone = ''
 
    async function sendOTP() {
      const phone = document.getElementById('phone').value
      currentPhone = phone
 
      const response = await fetch('http://localhost:3000/auth/send-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone: phone })
      })
 
      const data = await response.json()
      document.getElementById('result').textContent = 
        JSON.stringify(data, null, 2)
    }
 
    async function verifyOTP() {
      const otp = document.getElementById('otp').value
 
      const response = await fetch('http://localhost:3000/auth/verify-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          phone: currentPhone, 
          otp: otp 
        })
      })
 
      const data = await response.json()
      document.getElementById('result').textContent = 
        JSON.stringify(data, null, 2)
    }
  </script>
</body>
</html>
